<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conditionals Speaking Cards</title>
<style>
body{font-family:Arial,sans-serif;background:#0b0b16;color:white;padding:20px}
h1{text-align:center;color:#00ffff}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.card{background:#17172a;border:1px solid #00ffff55;border-radius:18px;padding:18px;box-shadow:0 0 10px #00ffff33}
.type{color:#00ffff;font-weight:bold}
.grammar{color:#ff66ff;font-weight:bold;display:block;margin:8px 0}
button{width:100%;padding:12px;margin-top:12px;border:none;border-radius:10px;background:#00ffff;cursor:pointer}
dialog{border:none;border-radius:12px;padding:20px}
</style>
</head>
<body>
<h1>Conditionals Speaking Cards</h1>
<div class="grid">
<script>
const cards=[
["Question & Answer","Second Conditional","If you could work remotely from any country, where would you live and why?","If I could work remotely from any country, I'd choose Portugal."],
["Tell About Yourself","First Conditional","If you have a free weekend next month, what will you do?","If I have a free weekend, I'll take a short trip."],
["Finish the Sentence","Third Conditional","If I had planned my last trip better, ...","...I wouldn't have missed several attractions."],
["Describe","Mixed Conditional","If you had chosen a different career years ago, how would your life be different now?","I might be working in a different industry now."],
["Ask Your Partner","Second Conditional","Ask your partner what restaurant they would open if money were not a problem.","What restaurant would you open if money were not a problem?"],
["Give Advice","Second Conditional","Your friend is nervous about a job interview abroad. What would you do if you were them?","If I were you, I'd practise interview questions."],
["Guess","First Conditional","What will happen if airlines continue to become more expensive?","More people will travel locally."],
["Mini Dialogue","First Conditional","A: If we miss the train, ...? B: ...","A: What will we do? B: We'll take the next train."],
["Food Discussion","Second Conditional","If you could eat only one cuisine forever, which would you choose?","I'd choose Mediterranean food."],
["Travel Story","Third Conditional","Describe a trip that would have been different if the weather had changed.","If it had been sunny, we'd have visited more places."],
["Work Discussion","Mixed Conditional","If your company had invested more in technology earlier, how might things be different today?","Employees would be working more efficiently."],
["Challenge","All Conditionals","Talk about a future goal using first, second and third conditionals.","If I succeed, I'll... If I changed..., I would... If I had started earlier, I would have..."]
];
document.write(cards.map((c,i)=>`
<div class="card">
<div class="type">${c[0]}</div>
<span class="grammar">${c[1]}</span>
<div>${c[2]}</div>
<button onclick="document.getElementById('d${i}').showModal()">Example Answer</button>
<dialog id="d${i}">
<p>${c[3]}</p>
<button onclick="document.getElementById('d${i}').close()">Close</button>
</dialog>
</div>`).join(''));
</script>
</div>
</body>
</html>
